# theta-spec documentation
# docs structure heavily inspired by uv (https://github.com/astral-sh/uv) 

site_name: theta-spec
site_description: A declarative, harness-agnostic agent configuration standard.
site_url: https://theta-spec.tamarillo.ai/
repo_url: https://github.com/tamarillo-ai/theta-spec
repo_name: theta-spec

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    code: JetBrains Mono
  features:
    - navigation.path
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - def_list

extra_css:
  - assets/extra.css

plugins:
  - search

nav:
  - home: index.md
  - overview: overview.md
  - manifest:
      - manifest/index.md
      - format: manifest/format.md
      - agent: manifest/agent.md
      - instructions: manifest/instructions.md
      - tools: manifest/tools.md
      - skills: manifest/skills.md
      - subagents: manifest/subagents.md
      - harness extensions: manifest/harness-extensions.md
      - extras: manifest/extras.md
  - protocol:
      - protocol/index.md
      - source resolution: protocol/sources.md
      - materialization: protocol/materialization.md
      - casting: protocol/casting.md
      - import: protocol/import.md
      - conformance: protocol/conformance.md
  - harnesses:
      - harnesses/index.md
      - claude code: harnesses/claude-code.md
      - codex cli: harnesses/codex-cli.md
      - cursor: harnesses/cursor.md
      - github copilot: harnesses/copilot.md
  - spec:
      - spec/index.md
      - manifest: spec/manifest.md
      - protocol: spec/protocol.md

extra:
  version:
    provider: mike
    alias: true
    default: latest
  status:
    new: Recently added
    deprecated: Deprecated
